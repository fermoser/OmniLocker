<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- CONFIGURAÇÃO NOTEBOOK --- */
        .logo-body {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            height: auto;
            z-index: 10;
        }

        .hero-section {
            display: flex;
            flex-direction: row; /* Texto Esquerda, Robô Direita */
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 30px; 
            padding-left: 150px; /* Mantém o empurrão para a direita no PC */
        }

        .hero-text {
            flex: none;
            text-align: left;
            max-width: 450px;
        }

        .hero-text h1 {
            font-size: 3.8rem;
            margin: 0;
            font-weight: 800;
            line-height: 0.9;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin: 15px 0 0 0;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
        }

        /* --- AJUSTE EXCLUSIVO PARA CELULAR --- */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                align-items: flex-start;
            }

            .logo-body {
                width: 175px;
                left: 50%;
                transform: translateX(-50%);
                top: 15px;
            }

            .hero-section {
                flex-direction: column-reverse; /* INVERTE: Robô vai para cima do texto */
                padding-left: 0; 
                margin-top: 205px; /* Espaço para não bater na logo */
                gap: 150px;
                margin-bottom: 70px; /* Espaço para não bater no footer */
            }

            .hero-text {
                text-align: center;
                padding: 0 20px;
            }

            .hero-text h1 { font-size: 2.5rem; }

            .hero-image img {
                max-height: 35vh; 
            }
        }
    </style>
</head>
<body>

    <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">

    <section class="hero-section">
        <div class="hero-text">
            <h1>OMNI<br>LOCKER</h1>
            <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
        </div>

        <div class="hero-image">
            <img src="RoboOmni.png" alt="Mascote Omni Locker">
        </div>
    </section>

    <footer>
        &copy;  2026  OMNI LOCKER  
    </footer>

</body>
</html>
