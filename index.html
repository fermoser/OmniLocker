<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* LOGO: Topo esquerdo no PC */
        .logo-body {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.15));
            z-index: 10;
        }

        /* CONTEÚDO CENTRAL */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 20px; /* Texto e Robô bem próximos agora */
            padding-left: 120px; /* Empurrão para a direita apenas no PC */
        }

        .hero-text {
            flex: none;
            text-align: left;
            max-width: 450px;
        }

        .hero-text h1 {
            font-size: 3.8rem;
            margin: 0;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin: 15px 0 0 0;
            line-height: 1.4;
        }

        .hero-image {
            flex: none;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(0, 210, 255, 0.25));
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* CONFIGURAÇÃO EXCLUSIVA PARA CELULAR (IPHONE/ANDROID) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto; /* Permite rolar se o robô for muito grande */
                align-items: flex-start; /* Alinha no topo no celular */
                padding-top: 80px;
            }

            .logo-body {
                width: 180px;
                left: 50%;
                transform: translateX(-50%); /* Centraliza a logo no topo */
                top: 15px;
            }

            .hero-section {
                flex-direction: column; /* Empilha: Robô em cima, Texto embaixo */
                padding-left: 0; /* REMOVE o empurrão da direita que quebrava o mobile */
                gap: 10px;
                text-align: center;
            }

            .hero-text {
                text-align: center;
                padding: 0 20px;
            }

            .hero-text h1 {
                font-size: 2.2rem; /* Diminui o texto para caber na largura do celular */
                line-height: 1.1;
            }

            .hero-text p {
                font-size: 1.1rem;
            }

            .hero-image img {
                max-height: 35vh; /* Robô menor no celular para sobrar espaço pro texto */
            }
        }
    </style>
</head>
<body>

    <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">

    <section class="hero-section">
        <div class="hero-image">
            <img src="RoboOmni.png" alt="Mascote Omni Locker">
        </div>

        <div class="hero-text">
            <h1>OMNI<br>LOCKER</h1>
            <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
        </div>
    </section>

</body>
</html>
