<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 10px 50px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 50px;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 40px;
        }

        /* O SEGREDO ESTÁ AQUI: Alinhamento perfeito à esquerda */
        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Força tudo para a esquerda */
            max-width: 600px;
        }

        .logo-body {
            width: 250px; /* Tamanho do logo grande */
            height: auto;
            margin-bottom: 25px; /* Empurra o H1 para baixo organizadamente */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin: 15px 0 45px 0;
            line-height: 1.6;
        }

        .btn-acesso {
            display: inline-block;
            padding: 20px 45px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark-bg);
            background-color: var(--primary-blue);
            border: none;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-acesso:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.5);
            background-color: #33e0ff;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 550px; /* Impede o robô de ficar gigante */
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.2));
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* CELULAR: Empilha o robô em cima ou embaixo e centraliza os textos */
        @media (max-width: 768px) {
            .hero-section { 
                flex-direction: column-reverse; /* Robô em cima, texto embaixo (ou vice-versa) */
                text-align: center; 
            }
            .hero-text {
                align-items: center; /* Centraliza logo e texto no celular */
            }
            .hero-text h1 { font-size: 2.5rem; }
            header { padding: 10px 20px; }
            .logo-body { width: 200px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="acessolocker.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600; font-size: 0.9rem; text-transform: uppercase;">
                Acesso Restrito
            </a>
        </nav>
    </header>

    <div class="container">
        <section class="hero-section">
            <div class="hero-text">
                <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">
                
                <h1>OMNI LOCKER</h1>
                <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
                
                <a href="acessolocker.html" class="btn-acesso">
                    Abrir Meu Locker
                </a>
            </div>

            <div class="hero-image">
                <img src="RoboOmni.png" alt="Mascote Omni Locker">
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 Moser Nutrição Animal - Inovação em Agribusiness e IoT.
    </footer>

</body>
</html>
