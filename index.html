<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center; /* Centraliza verticalmente o conteúdo principal */
            justify-content: center; /* Centraliza horizontalmente o conteúdo principal */
            overflow: hidden;
            position: relative; /* Necessário para a logo se basear no corpo da página */
        }

        /* LOGO: Fixa no topo esquerdo, ignorando o resto do alinhamento */
        .logo-body {
            position: absolute;
            top: 20px;    /* Distância de "um dedo" do topo */
            left: 20px;   /* Distância de "um dedo" da esquerda */
            width: 286px; /* 30% maior que o original */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.15));
            z-index: 10;
        }

        /* CONTEÚDO CENTRAL: Robô e Texto */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 60px;
            padding: 0 40px;
        }

        .hero-text {
            flex: 1;
            text-align: left;
        }

        .hero-text h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.4rem;
            color: #94a3b8;
            margin: 20px 0 0 0;
            line-height: 1.4;
            max-width: 400px;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            max-width: 110%; /* Robô levemente maior para equilibrar com a logo */
            max-height: 70vh;
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(0, 210, 255, 0.25));
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #334155;
            letter-spacing: 2px;
        }

        /* AJUSTES PARA CELULAR */
        @media (max-width: 768px) {
            .hero-section { 
                flex-direction: column-reverse;
                text-align: center;
                gap: 20px;
            }
            .logo-body {
                width: 180px;
                left: 50%;
                transform: translateX(-50%); /* Centraliza a logo no topo no celular */
            }
            .hero-text {
                align-items: center;
                text-align: center;
            }
            .hero-text h1 { font-size: 3rem; }
            .hero-text p { margin: 10px auto; }
        }
    </style>
</head>
<body>

    <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">

    <section class="hero-section">
        <div class="hero-text">
            <h1>OMNI<br>LOCKER</h1>
            <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
        </div>

        <div class="hero-image">
            <img src="RoboOmni.png" alt="Mascote Omni Locker">
        </div>
    </section>

    <footer>
        &copy; 2026 OMNI LOCKER
    </footer>

</body>
</html>
