<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- CONFIGURAÇÃO NOTEBOOK (COMO VOCÊ QUERIA) --- */
        .logo-body {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            height: auto;
            z-index: 10;
        }

        .hero-section {
            display: flex;
            flex-direction: row; /* Mantém horizontal no PC */
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            gap: 30px; 
            padding-left: 150px; /* Aquele "empurrão" para a direita que você gostou */
        }

        .hero-text {
            flex: none;
            text-align: left;
            max-width: 450px;
        }

        .hero-text h1 {
            font-size: 3.8rem;
            margin: 0;
            font-weight: 800;
            line-height: 0.9;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin: 15px 0 0 0;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* --- AJUSTE EXCLUSIVO PARA IPHONE / CELULAR --- */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                align-items: flex-start; /* Alinha pelo topo para não embolar */
            }

            .logo-body {
                width: 200px;
                left: 50%;
                transform: translateX(-50%); /* Logo centralizada no topo */
                top: 15px;
            }

            .hero-section {
                flex-direction: column; /* No celular empilha */
                padding-left: 0; /* Tira o empurrão do PC */
                margin-top: 180px; /* AQUI: Desce o robô para não bater na logo */
                gap: 20px;
            }

            .hero-text {
                text-align: center;
                padding: 0 20px;
            }

            .hero-text h1 { font-size: 2.5rem; }

            .hero-image img {
                max-height: 40vh; /* Diminui um pouco o robô no celular */
            }
        }
    </style>
</head>
<body>

    <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">

    <section class="hero-section">
        <div class="hero-text">
            <h1>OMNI<br>LOCKER</h1>
            <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
        </div>

        <div class="hero-image">
            <img src="RoboOmni.png" alt="Mascote Omni Locker">
        </div>
    </section>

</body>
</html>
