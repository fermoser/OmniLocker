<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            height: 100vh; /* Trava a altura na tela */
            overflow: hidden; /* Evita rolagens desnecessárias */
        }

        /* Removido o Header conforme solicitado */

        .container {
            flex: 1;
            display: flex;
            align-items: center; /* Centraliza verticalmente com o robô */
            justify-content: center;
            padding: 0 20px; /* Reduzido padding para subir o conteúdo */
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 40px;
            margin-top: -50px; /* Puxa todo o bloco para cima */
        }

        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            max-width: 600px;
        }

        .logo-body {
            width: 220px; /* Ajuste leve no tamanho */
            height: auto;
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin: 15px 0 0 0; /* Removido margem de baixo que era para o botão */
            line-height: 1.6;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 500px; 
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.2));
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .hero-section { 
                flex-direction: column-reverse;
                text-align: center; 
                margin-top: 0;
            }
            .hero-text {
                align-items: center;
            }
            .hero-text h1 { font-size: 2.5rem; }
            .logo-body { width: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero-section">
            <div class="hero-text">
                <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">
                
                <h1>OMNI LOCKER</h1>
                <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
                
                </div>

            <div class="hero-image">
                <img src="RoboOmni.png" alt="Mascote Omni Locker">
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 OMNI LOCKER
    </footer>

</body>
</html>
