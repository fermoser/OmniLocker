<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: flex-start; /* MUDANÇA: Agora alinha tudo no topo */
            justify-content: center;
            padding: 5vh 20px 0 20px; /* 5vh de espaço do topo da tela */
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .hero-section {
            display: flex;
            align-items: flex-start; /* Alinha o topo do texto com o topo do robô */
            justify-content: space-between;
            width: 100%;
            gap: 40px;
        }

        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            max-width: 600px;
            padding-top: 20px; /* Ajuste fino para alinhar com o "ombro" do robô */
        }

        .logo-body {
            width: 286px; /* Aumentado em 30% (era 220px) */
            height: auto;
            margin-bottom: 10px; 
            margin-left: -5px; /* Puxa levemente mais para a esquerda para alinhar visualmente */
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.15));
        }

        .hero-text h1 {
            font-size: 3.8rem; /* Aumentado um pouco para acompanhar a logo */
            margin: 0;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.3rem;
            color: #94a3b8;
            margin: 20px 0 0 0;
            line-height: 1.5;
            max-width: 450px;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .hero-image img {
            max-width: 100%;
            max-height: 65vh; /* Aumentado o limite do robô para ele acompanhar a logo */
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(0, 210, 255, 0.25));
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
            color: #334155;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        @media (max-width: 768px) {
            .container { padding-top: 20px; }
            .hero-section { 
                flex-direction: column-reverse;
                text-align: center; 
            }
            .hero-text {
                align-items: center;
            }
            .hero-text h1 { font-size: 2.8rem; }
            .logo-body { width: 220px; }
            .hero-image img { max-height: 40vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero-section">
            <div class="hero-text">
                <img src="LogoOmni.png" alt="Logo Omni Locker" class="logo-body">
                <h1>OMNI<br>LOCKER</h1>
                <p>Tecnologia avançada em armários inteligentes para condomínios e empresas.</p>
            </div>

            <div class="hero-image">
                <img src="RoboOmni.png" alt="Mascote Omni Locker">
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 OMNI LOCKER
    </footer>

</body>
</html>
