<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI LOCKER - Inteligência que Entrega</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .logo-container img {
            height: 70px; /* Ajuste conforme o tamanho do seu logoMoser */
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-section {
            display: flex;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap-reverse;
            justify-content: center;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
            text-align: left;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin: 20px 0 40px 0;
            line-height: 1.6;
        }

        .btn-acesso {
            display: inline-block;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--dark-bg);
            background-color: var(--primary-blue);
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .btn-acesso:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(0, 210, 255, 0.6);
            background-color: #33e0ff;
        }

        .hero-image {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            /* Um leve brilho azul atrás do robô para dar profundidade */
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.3));
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .hero-text { text-align: center; }
            .hero-text h1 { font-size: 2.5rem; }
            header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="LogoOmni.png" alt="Logo Moser">
        </div>
        <nav>
            <a href="acessolocker.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 500;">Entrar</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero-section">
            <div class="hero-text">
                <h1>OMNI LOCKER</h1>
                <p>A solução inteligente e segura para a gestão de encomendas e lockers automatizados.</p>
                
                <a href="acessolocker.html" class="btn-acesso">
                    ACESSAR MEU LOCKER
                </a>
            </div>

            <div class="hero-image">
                <img src="RoboOmni.png" alt="Mascote Omni Locker">
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 Moser Nutrição Animal - Divisão Tecnologia. Todos os direitos reservados.
    </footer>

</body>
</html>
